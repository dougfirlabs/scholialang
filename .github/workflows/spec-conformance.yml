name: spec-conformance

on:
  push:
  pull_request:

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Clone pinned spec
        run: |
          ref="$(cat scholialang-spec-ref.txt)"
          git clone --depth 1 --branch "$ref" https://github.com/dougfirlabs/scholialang-spec ../scholialang-spec \
            || git clone --depth 1 https://github.com/dougfirlabs/scholialang-spec ../scholialang-spec \
            || {
              echo "scholialang-spec is not publicly cloneable yet; using mirrored examples for prerelease CI"
              mkdir -p ../scholialang-spec/examples
              cp -R tests/fixtures/scholia/v03_known_corpus ../scholialang-spec/examples/
              cp -R tests/fixtures/scholia/v031_atoms ../scholialang-spec/examples/
            }
      - name: Validate spec examples
        run: python scripts/run_spec_conformance.py ../scholialang-spec
